name: Build Image

on:
  workflow_call:
    inputs:
      platforms:
        description: 'Target platforms (comma-separated, e.g. linux/amd64,linux/arm64)'
        required: false
        type: string
        default: 'linux/amd64,linux/arm64'
      version:
        description: 'Image version tag (optional)'
        required: false
        type: string
        default: ''
    secrets:
      docker_username:
        required: true
      docker_password:
        required: true

jobs:
  encrypt:
    uses: nfrastack/gha/.github/workflows/encrypt.yml@main
    secrets: inherit

  build:
    needs: encrypt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.ref }}
      - name: Checkout gha actions repo
        uses: actions/checkout@v4
        with:
          repository: nfrastack/gha
          ref: main
          path: gha
      - name: Build and Push Docker Image
        uses: ./gha/.github/actions/build_simple_image
        with:
          docker_username: ${{ secrets.DOCKER_USERNAME }}
          docker_password: ${{ secrets.DOCKER_PASSWORD }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          platforms: ${{ inputs.platforms }}
          version: ${{ inputs.version }}

  cleanup:
    needs: build
    uses: nfrastack/gha/.github/workflows/remove_artifacts.yml@main
    secrets: inherit
