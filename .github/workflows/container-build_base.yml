# =============================================================================
# Base Container Build Workflow
# =============================================================================
#
# Reusable workflow for building the container-base image.
# Handles module selection (IMAGE_BASE_MODULES, IMAGE_MODULES) and
# image variants (core, faflopza, faflopzaze).
#
# No BASE_IMAGE — this IS the base image in the dependency chain.
#
# Build-args passed to Docker:
#   DISTRO, DISTRO_VARIANT, IMAGE_BASE_MODULES, IMAGE_MODULES
#
# =============================================================================

name: Base Container Build

on:
  workflow_call:
    inputs:
      distro:
        required: true
        type: string
      distro_variant:
        required: true
        type: string
      image_variant:
        required: false
        type: string
      latest:
        required: false
        type: string
        default: "false"
      distro_latest:
        required: false
        type: string
        default: "false"
      platforms:
        required: false
        type: string
        default: linux/amd64,linux/arm64
      image_base_modules:
        required: false
        type: string
      image_modules:
        required: false
        type: string
      push_dockerhub:
        required: false
        type: boolean
        default: true
      push_ghcr:
        required: false
        type: boolean
        default: true
      base_image_version:
        required: false
        type: string
        description: "Pin upstream distro image to a specific version. Overrides distro_variant in FROM reference."

jobs:
  prepare:
    name: "prepare (${{ inputs.distro }}_${{ inputs.distro_variant }} ${{ inputs.image_variant }})"
    runs-on: ubuntu-latest
    outputs:
      container_tags: ${{ steps.prep.outputs.container_tags }}
      build_args: ${{ steps.prep.outputs.build_args }}
      has_arm64: ${{ steps.arch.outputs.has_arm64 }}
      has_amd64: ${{ steps.arch.outputs.has_amd64 }}
      staging_prefix: ${{ steps.prep.outputs.staging_prefix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download Encrypted Files
        uses: actions/download-artifact@v4
        with:
          name: encrypted-artifacts
          path: ./
        continue-on-error: true

      - name: Clean repository
        run: |
          if [ -f "cleanup.sh" ] ; then
            chmod +x cleanup.sh
            ./cleanup.sh
          fi

      - name: Determine architectures
        id: arch
        run: |
          platforms="${{ inputs.platforms }}"
          echo "has_arm64=$(echo "$platforms" | grep -q arm64 && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has_amd64=$(echo "$platforms" | grep -q amd64 && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Prepare tags
        id: prep
        env:
          INPUT_DISTRO: ${{ inputs.distro }}
          INPUT_DISTRO_VARIANT: ${{ inputs.distro_variant }}
          INPUT_IMAGE_VARIANT: ${{ inputs.image_variant }}
          INPUT_LATEST: ${{ inputs.latest }}
          INPUT_DISTRO_LATEST: ${{ inputs.distro_latest }}
          INPUT_PUSH_DOCKERHUB: ${{ inputs.push_dockerhub }}
          INPUT_PUSH_GHCR: ${{ inputs.push_ghcr }}
          INPUT_IMAGE_BASE_MODULES: ${{ inputs.image_base_modules }}
          INPUT_IMAGE_MODULES: ${{ inputs.image_modules }}
          INPUT_BASE_IMAGE_VERSION: ${{ inputs.base_image_version }}
        run: |
          LATEST="${INPUT_LATEST:-false}"
          DISTRO_LATEST="${INPUT_DISTRO_LATEST:-false}"
          IMAGE_VARIANT="${INPUT_IMAGE_VARIANT:-}"

          staging_prefix="${GITHUB_SHA:0:12}"
          echo "staging_prefix=${staging_prefix}" >> $GITHUB_OUTPUT

          branch_name=""
          if [[ "${GITHUB_REF}" == refs/heads/* ]]; then
            branch_name="${GITHUB_REF#refs/heads/}"
          fi

          base_tag=""
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            base_tag="$(echo ${GITHUB_REF} | sed 's|refs/tags/||g')"
          fi

          tag_list=()

          if [[ "$branch_name" =~ ^(main|master)$ ]]; then
            if [ "${LATEST,,}" == "true" ]; then
              image_latest="latest"
              tag_list+=("$image_latest")
            fi
            if [ "${DISTRO_LATEST,,}" = "true" ]; then
              tag_list+=("${INPUT_DISTRO,,}")
            fi
            if [ "${IMAGE_VARIANT}" = "faflopza" ]; then
              tag_list+=("${INPUT_DISTRO,,}_${INPUT_DISTRO_VARIANT,,}_${IMAGE_VARIANT,,}")
              tag_list+=("${INPUT_DISTRO,,}_${INPUT_DISTRO_VARIANT,,}")
            else
              tag_list+=("${INPUT_DISTRO,,}_${INPUT_DISTRO_VARIANT,,}_${IMAGE_VARIANT,,}")
            fi
          elif [[ "$branch_name" == "develop" ]]; then
            tag_list+=("develop")
          elif [[ -n "$branch_name" ]]; then
            safe_branch="$(echo "${branch_name}" | sed 's|/|-|g')"
            tag_list+=("${safe_branch}")
          fi

          if [[ -n "$base_tag" ]]; then
            if [ "${LATEST,,}" == "true" ]; then
              tag_list+=("${base_tag}")
            fi
            if [ "${IMAGE_VARIANT}" = "faflopza" ]; then
              tag_list+=("$(echo ${GITHUB_REF}-${INPUT_DISTRO,,}_${INPUT_DISTRO_VARIANT,,} | sed 's|refs/tags/||g')")
            else
              tag_list+=("$(echo ${GITHUB_REF}-${INPUT_DISTRO,,}_${INPUT_DISTRO_VARIANT,,}_${IMAGE_VARIANT,,} | sed 's|refs/tags/||g')")
            fi
          fi

          # Deduplicate
          declare -A seen
          unique_tags=()
          for t in "${tag_list[@]}"; do
            if [[ ! "$t" =~ ^[-_] && -z "${seen[$t]:-}" ]]; then
              seen[$t]=1
              unique_tags+=("$t")
            fi
          done

          all_tags=""
          for t in "${unique_tags[@]}"; do
            all_tags+="${GITHUB_REPOSITORY}:$t,"
          done
          all_tags="${all_tags%,}"

          dockerhub_tags=""
          ghcr_tags=""
          if [ "${INPUT_PUSH_DOCKERHUB,,}" = "true" ] ; then
            dockerhub_tags=$(echo "$all_tags" | sed "s|${GITHUB_REPOSITORY}|docker.io/${GITHUB_REPOSITORY/container-/}|g")
          fi
          if [ "${INPUT_PUSH_GHCR,,}" = "true" ] ; then
            ghcr_tags=$(echo "$all_tags" | sed "s|${GITHUB_REPOSITORY}|ghcr.io/${GITHUB_REPOSITORY}|g")
          fi

          final_tags="$dockerhub_tags,$ghcr_tags"
          final_tags=$(echo "$final_tags" | sed 's/^,*//;s/,,*/,/g;s/,$//')
          echo "container_tags=$final_tags" >> $GITHUB_OUTPUT

          # Build-args — BASE_IMAGE is the full upstream distro reference
          # If base_image_version is set, use it instead of distro_variant
          distro_tag="${INPUT_BASE_IMAGE_VERSION:-${INPUT_DISTRO_VARIANT}}"
          echo "build_args<<BUILDARGS_EOF" >> $GITHUB_OUTPUT
          echo "BASE_IMAGE=docker.io/${INPUT_DISTRO}:${distro_tag}" >> $GITHUB_OUTPUT
          if [ -n "${INPUT_IMAGE_BASE_MODULES}" ]; then
            echo "IMAGE_BASE_MODULES=${INPUT_IMAGE_BASE_MODULES}" >> $GITHUB_OUTPUT
          fi
          if [ -n "${INPUT_IMAGE_MODULES}" ]; then
            echo "IMAGE_MODULES=${INPUT_IMAGE_MODULES}" >> $GITHUB_OUTPUT
          fi
          echo "BUILDARGS_EOF" >> $GITHUB_OUTPUT

      - name: Label Containerfile
        run: |
          image_name=${GITHUB_REPOSITORY/${GITHUB_REPOSITORY_OWNER}\/container-/image.}
          if [ -f "Containerfile" ] ; then
              sed -i \
                -e "/FROM .*/a LABEL ${GITHUB_REPOSITORY_OWNER}.${image_name}.git_repository=\"https://github.com/${GITHUB_REPOSITORY}\"" \
                -e "/FROM .*/a LABEL ${GITHUB_REPOSITORY_OWNER}.${image_name}.git_commit=\"${GITHUB_SHA}\"" \
                -e "/FROM .*/a LABEL ${GITHUB_REPOSITORY_OWNER}.${image_name}.git_committed_by=\"${GITHUB_ACTOR}\"" \
                -e "/FROM .*/a LABEL ${GITHUB_REPOSITORY_OWNER}.${image_name}.image_build_date=\"$(date +'%Y-%m-%d %H:%M:%S')\"" \
                -e "/FROM .*/a LABEL ${GITHUB_REPOSITORY_OWNER}.${image_name}.distro=\"${{ inputs.distro }}\"" \
                -e "/FROM .*/a LABEL ${GITHUB_REPOSITORY_OWNER}.${image_name}.distro_variant=\"${{ inputs.distro_variant }}\"" \
                -e "/FROM .*/a LABEL ${GITHUB_REPOSITORY_OWNER}.${image_name}.image_variant=\"${{ inputs.image_variant }}\"" \
                -e "/FROM .*/a LABEL org.opencontainers.image.source=\"https://github.com/${GITHUB_REPOSITORY}\"" \
                -e "s|\"Base\"|\"Base ${{ inputs.distro }}_${{ inputs.distro_variant }}\"|" \
                Containerfile

              if [[ $GITHUB_REF == refs/tags/* ]]; then
                sed -i "/FROM .*/a LABEL ${GITHUB_REPOSITORY_OWNER}.${image_name}.git_tag=\"${GITHUB_REF#refs/tags/v}\"" Containerfile
              fi
              if [[ $GITHUB_REF == refs/heads/* ]]; then
                sed -i "/FROM .*/a LABEL ${GITHUB_REPOSITORY_OWNER}.${image_name}.git_branch=\"${GITHUB_REF#refs/heads/}\"" Containerfile
              fi
          fi

      - name: Upload workspace
        uses: actions/upload-artifact@v4
        with:
          name: build-workspace-${{ github.run_id }}-${{ inputs.distro }}-${{ inputs.distro_variant }}-${{ inputs.image_variant }}
          path: .
          retention-days: 1

  build-amd64:
    name: "build-amd64 (${{ inputs.distro }}_${{ inputs.distro_variant }} ${{ inputs.image_variant }})"
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.has_amd64 == 'true' && github.event_name != 'pull_request'
    steps:
      - name: Download workspace
        uses: actions/download-artifact@v4
        with:
          name: build-workspace-${{ github.run_id }}-${{ inputs.distro }}-${{ inputs.distro_variant }}-${{ inputs.image_variant }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ghcr.io/${{ github.repository }}:${{ needs.prepare.outputs.staging_prefix }}-${{ inputs.distro }}-${{ inputs.distro_variant }}-${{ inputs.image_variant }}-amd64
          build-args: ${{ needs.prepare.outputs.build_args }}

  build-arm64:
    name: "build-arm64 (${{ inputs.distro }}_${{ inputs.distro_variant }} ${{ inputs.image_variant }})"
    runs-on: ubuntu-24.04-arm
    needs: prepare
    if: needs.prepare.outputs.has_arm64 == 'true' && github.event_name != 'pull_request'
    steps:
      - name: Download workspace
        uses: actions/download-artifact@v4
        with:
          name: build-workspace-${{ github.run_id }}-${{ inputs.distro }}-${{ inputs.distro_variant }}-${{ inputs.image_variant }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          platforms: linux/arm64
          push: true
          provenance: false
          tags: ghcr.io/${{ github.repository }}:${{ needs.prepare.outputs.staging_prefix }}-${{ inputs.distro }}-${{ inputs.distro_variant }}-${{ inputs.image_variant }}-arm64
          build-args: ${{ needs.prepare.outputs.build_args }}

  manifest:
    name: "manifest (${{ inputs.distro }}_${{ inputs.distro_variant }} ${{ inputs.image_variant }})"
    runs-on: ubuntu-latest
    needs: [prepare, build-amd64, build-arm64]
    if: always() && github.event_name != 'pull_request' && (needs.build-amd64.result == 'success' || needs.build-arm64.result == 'success')
    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push manifests
        env:
          CONTAINER_TAGS: ${{ needs.prepare.outputs.container_tags }}
          STAGING_PREFIX: ${{ needs.prepare.outputs.staging_prefix }}-${{ inputs.distro }}-${{ inputs.distro_variant }}-${{ inputs.image_variant }}
          HAS_AMD64: ${{ needs.prepare.outputs.has_amd64 }}
          HAS_ARM64: ${{ needs.prepare.outputs.has_arm64 }}
          AMD64_RESULT: ${{ needs.build-amd64.result }}
          ARM64_RESULT: ${{ needs.build-arm64.result }}
        run: |
          sources=""
          staging_repo="ghcr.io/${GITHUB_REPOSITORY}"
          if [[ "$HAS_AMD64" == "true" && "$AMD64_RESULT" == "success" ]]; then
            sources="${staging_repo}:${STAGING_PREFIX}-amd64"
          fi
          if [[ "$HAS_ARM64" == "true" && "$ARM64_RESULT" == "success" ]]; then
            sources="${sources} ${staging_repo}:${STAGING_PREFIX}-arm64"
          fi
          sources=$(echo "$sources" | xargs)

          if [ -z "$sources" ]; then
            echo "::error::No successful arch builds to create manifest from"
            exit 1
          fi

          IFS=',' read -ra TAGS <<< "$CONTAINER_TAGS"
          for tag in "${TAGS[@]}"; do
            tag=$(echo "$tag" | xargs)
            if [ -z "$tag" ]; then continue; fi
            echo "Creating manifest for: $tag"
            docker buildx imagetools create -t "$tag" $sources
          done

  summary:
    name: "summary (${{ inputs.distro }}_${{ inputs.distro_variant }} ${{ inputs.image_variant }})"
    runs-on: ubuntu-latest
    needs: [prepare, build-amd64, build-arm64, manifest]
    if: always() && github.event_name != 'pull_request'
    steps:
      - name: Build Summary
        env:
          AMD64_RESULT: ${{ needs.build-amd64.result }}
          ARM64_RESULT: ${{ needs.build-arm64.result }}
          MANIFEST_RESULT: ${{ needs.manifest.result }}
          CONTAINER_TAGS: ${{ needs.prepare.outputs.container_tags }}
          HAS_AMD64: ${{ needs.prepare.outputs.has_amd64 }}
          HAS_ARM64: ${{ needs.prepare.outputs.has_arm64 }}
        run: |
          status_icon() {
            case "$1" in
              success) echo "pass" ;;
              skipped) echo "skip" ;;
              *) echo "FAIL" ;;
            esac
          }

          {
            echo "## Build: ${{ inputs.distro }}_${{ inputs.distro_variant }} (${{ inputs.image_variant }})"
            echo ""
            echo "| Architecture | Status |"
            echo "|-------------|--------|"
            if [[ "$HAS_AMD64" == "true" ]]; then
              echo "| amd64 | $(status_icon "$AMD64_RESULT") |"
            fi
            if [[ "$HAS_ARM64" == "true" ]]; then
              echo "| arm64 | $(status_icon "$ARM64_RESULT") |"
            fi
            echo "| Manifest | $(status_icon "$MANIFEST_RESULT") |"
            echo ""
            if [[ "$MANIFEST_RESULT" == "success" ]]; then
              echo "### Tags"
              IFS=',' read -ra TAGS <<< "$CONTAINER_TAGS"
              for tag in "${TAGS[@]}"; do
                tag=$(echo "$tag" | xargs)
                [ -n "$tag" ] && echo "- \`${tag}\`"
              done
            fi
          } >> $GITHUB_STEP_SUMMARY

          if [[ "$AMD64_RESULT" == "failure" ]]; then echo "::error::amd64 build failed"; fi
          if [[ "$ARM64_RESULT" == "failure" ]]; then echo "::error::arm64 build failed"; fi
          if [[ "$MANIFEST_RESULT" == "failure" ]]; then echo "::error::Manifest creation failed"; fi
          if [[ "$AMD64_RESULT" == "failure" || "$ARM64_RESULT" == "failure" || "$MANIFEST_RESULT" == "failure" ]]; then
            exit 1
          fi
