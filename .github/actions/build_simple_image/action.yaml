name: "Build and Push Simple Docker Image"
description: "Reusable action to build and push a Docker image for any repo, with simple platform/version args."
inputs:
  docker_username:
    description: "DockerHub Username"
    required: true
  docker_password:
    description: "DockerHub Password"
    required: true
  github_token:
    description: "GitHub Token for GitHub Container Registry"
    required: true
  platforms:
    description: "Target platforms (comma-separated, e.g. linux/amd64,linux/arm64)"
    required: false
    default: "linux/amd64,linux/arm64"
  version:
    description: "Image version tag (optional)"
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ inputs.docker_username }}
        password: ${{ inputs.docker_password }}
    - name: Debug: List GHCR container-base tags
      run: echo "Listing tags for ghcr.io/nfrastack/container-base:" ; curl -H "Authorization: Bearer ${{ inputs.github_token }}" https://ghcr.io/v2/nfrastack/container-base/tags/list || true
      shell: bash
    - name: Debug: Show Containerfile FROM line
      run: grep -i '^FROM' ./Containerfile || true
      shell: bash
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Containerfile
        platforms: ${{ inputs.platforms }}
        push: true
        tags: |
          ghcr.io/${{ github.repository }}${{ inputs.version && format(':{}', inputs.version) || '' }}
          docker.io/${{ github.repository }}${{ inputs.version && format(':{}', inputs.version) || '' }}
